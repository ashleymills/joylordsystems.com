    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

</head>
<body>

<nav class="site-nav">
    <div class="container">
        <a href="../" class="nav-brand">Joylord Systems</a>
        <button class="nav-toggle" aria-label="Toggle navigation" onclick="document.querySelector('.nav-links').classList.toggle('open')">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-links">
            <li><a href="../foto-flipper/">Photo Flipper</a></li>
            <li><a href="../secret-santa/">Secret Santa</a></li>

            <li><a href="../support/">Support</a></li>
        </ul>
    </div>
</nav>

<div class="page-content">
    <div class="container">
        <h1>Get in Touch</h1>
        <p>Have a question, need help with one of our apps, or want to discuss a project? Fill in the form below and we'll get back to you.</p>

        <!-- Replace YOUR_FORM_ID with your Formspree endpoint after creating a free account at formspree.io -->
        <form class="contact-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject" required>
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" required></textarea>
            </div>
            <button type="submit" class="btn">Send Message</button>
        </form>
    </div>
</div>

<footer class="site-footer">
    <div class="container">

    </div>
</footer>

</body>
